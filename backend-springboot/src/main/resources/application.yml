spring:
  application:
    name: voice-assistant
  
  datasource:
    url: jdbc:h2:mem:voice_assistant;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:D3A7C15904F2E4968C0BE7121F24128D8EBA4F1A5B4C3D2E1F0A9B8C7D6E5F4A}
    expiration-ms: 86400000 # 24 hours
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/voice_assistant}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:SecretPassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
